version: "3.9"

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: adacompute-db
    environment:
      POSTGRES_USER: adacompute
      POSTGRES_PASSWORD: adacompute_dev
      POSTGRES_DB: adacompute
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adacompute"]
      interval: 5s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: adacompute-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://adacompute:adacompute_dev@db:5432/adacompute
      BLOCKFROST_API_KEY: ${BLOCKFROST_API_KEY:-}
      CARDANO_NETWORK: ${CARDANO_NETWORK:-preprod}
      CORS_ORIGINS: '["http://localhost:3000"]'
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

volumes:
  pgdata:
